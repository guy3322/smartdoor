<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartDoor — כניסת אורח</title>
<style>
  body{margin:0;font-family:'Heebo',system-ui,sans-serif;background:#f4f6f9;color:#1a202c;
       display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{background:#fff;border-radius:18px;box-shadow:0 4px 24px rgba(0,0,0,.08);
        padding:32px 26px;max-width:340px;width:90%;text-align:center}
  h1{font-size:22px;margin:0 0 4px}
  .sub{color:#718096;font-size:14px;margin-bottom:22px}
  .big-btn{width:100%;padding:16px;font-size:17px;font-weight:700;border:none;border-radius:12px;
           background:#0b7a62;color:#fff;cursor:pointer;font-family:inherit}
  .big-btn:disabled{background:#a0aec0;cursor:not-allowed}
  .status{margin-top:18px;font-size:14px;min-height:42px;line-height:1.5}
  .status.ok{color:#0b7a62;font-weight:700;font-size:17px}
  .status.err{color:#c53030}
  .note{font-size:12px;color:#a0aec0;margin-top:18px;line-height:1.6}
  .door-emoji{font-size:52px;margin-bottom:8px}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid #cbd5e0;border-top-color:#0b7a62;
        border-radius:50%;animation:s .7s linear infinite;vertical-align:middle;margin-inline-end:6px}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="door-emoji">🚪</div>
  <h1>כניסה לבניין</h1>
  <div class="sub" id="doorName">SmartDoor</div>
  <button class="big-btn" id="openBtn">פתח את הדלת</button>
  <div class="status" id="status">עמוד ליד דלת הכניסה ולחץ על הכפתור</div>
  <div class="note">
    הקישור חד-פעמי ופג אוטומטית.<br>
    נדרש דפדפן Chrome (אנדרואיד) עם Bluetooth פעיל.<br>
    iPhone: פתח את הקישור באפליקציית Bluefy.
  </div>
</div>

<script>
// UUIDs — must match ESP32 config.h
const SERVICE_UUID  = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const GUEST_UUID    = '6e400007-b5a3-f393-e0a9-e50e24dcca9e';
const RESPONSE_UUID = '6e400006-b5a3-f393-e0a9-e50e24dcca9e';
const RESP_OK = 0x00;

const $ = id => document.getElementById(id);

// Parse link fragment: #d=<bleName>&t=<base64url token>
const params = new URLSearchParams(location.hash.slice(1));
const doorName = params.get('d');
const tokenB64 = params.get('t');

function b64urlToBytes(s) {
  s = s.replace(/-/g, '+').replace(/_/g, '/');
  const bin = atob(s);
  return Uint8Array.from(bin, c => c.charCodeAt(0));
}

let token = null;
if (!doorName || !tokenB64) {
  $('status').textContent = 'קישור לא תקין — בקש קישור חדש מהדייר';
  $('status').className = 'status err';
  $('openBtn').disabled = true;
} else {
  $('doorName').textContent = doorName;
  try {
    token = b64urlToBytes(tokenB64);
    // Client-side expiry hint (real check happens on the device)
    const expiry = new DataView(token.buffer).getUint32(32, true);
    if (Date.now() / 1000 > expiry) {
      $('status').textContent = 'הקישור פג תוקף — בקש קישור חדש מהדייר';
      $('status').className = 'status err';
      $('openBtn').disabled = true;
    }
  } catch (e) {
    $('status').textContent = 'קישור פגום';
    $('status').className = 'status err';
    $('openBtn').disabled = true;
  }
}

$('openBtn').onclick = async () => {
  if (!navigator.bluetooth) {
    $('status').innerHTML = 'הדפדפן לא תומך ב-Bluetooth.<br>פתח ב-Chrome (אנדרואיד) או Bluefy (iPhone).';
    $('status').className = 'status err';
    return;
  }
  const btn = $('openBtn'), st = $('status');
  btn.disabled = true;
  st.className = 'status';
  try {
    st.innerHTML = '<span class="spin"></span>מחפש את הדלת…';
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ name: doorName }],
      optionalServices: [SERVICE_UUID]
    });

    st.innerHTML = '<span class="spin"></span>מתחבר…';
    const server  = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);

    // Listen for the door's verdict before writing the token
    const respChar = await service.getCharacteristic(RESPONSE_UUID);
    const verdict = new Promise((resolve, reject) => {
      const timer = setTimeout(() => reject(new Error('timeout')), 8000);
      respChar.addEventListener('characteristicvaluechanged', e => {
        clearTimeout(timer);
        resolve(e.target.value.getUint8(0));
      }, { once: true });
    });
    await respChar.startNotifications();

    st.innerHTML = '<span class="spin"></span>שולח אישור כניסה…';
    const guestChar = await service.getCharacteristic(GUEST_UUID);
    await guestChar.writeValue(token);

    const code = await verdict;
    device.gatt.disconnect();

    if (code === RESP_OK) {
      st.textContent = '✅ הדלת נפתחה — ברוך הבא!';
      st.className = 'status ok';
      btn.textContent = 'הדלת נפתחה';
    } else {
      st.textContent = 'הכניסה נדחתה — הקישור פג או כבר נוצל';
      st.className = 'status err';
      btn.disabled = false;
    }
  } catch (e) {
    st.textContent = e.message === 'timeout'
      ? 'אין תגובה מהדלת — נסה שוב קרוב יותר'
      : 'החיבור נכשל — ודא ש-Bluetooth פעיל ונסה שוב';
    st.className = 'status err';
    btn.disabled = false;
  }
};
</script>
</body>
</html>
